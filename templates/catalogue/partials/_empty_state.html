<div class="catalogue-empty-state text-center py-5">
  <div class="catalogue-empty-icon mb-3" aria-hidden="true">🔍</div>
  <h3 class="h5 fw-semibold mb-2">No services found</h3>
  <p class="text-muted mb-3">
    {% if params.search or params.categories or params.centers %} No services
    match your current filters or search. {% else %} No approved services are
    available yet. {% endif %}
  </p>
  {% if params.search or params.categories or params.centers %}
  <a
    href="{% url 'catalogue:index' %}"
    class="btn btn-outline-secondary btn-sm"
    hx-get="{% url 'catalogue:grid' %}"
    hx-target="#catalogue-grid"
    hx-push-url="true"
  >
    Clear all filters
  </a>
  {% endif %}
</div>
