{% extends "admin/change_list.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
#maturity-modal {
  border: none;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,.35);
  padding: 0;
  max-width: 500px;
  width: 100%;
}
#maturity-modal::backdrop {
  background: rgba(0,0,0,.45);
}
#maturity-modal .modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: .85rem 1.25rem;
  border-bottom: 1px solid var(--border-color, #ccc);
}
#maturity-modal .modal-header strong {
  font-size: .95rem;
}
#maturity-modal .modal-close-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.3rem;
  line-height: 1;
  color: var(--body-fg, #333);
  padding: 0 .25rem;
}
#maturity-modal .modal-body {
  padding: 1.1rem 1.25rem 1.25rem;
  max-height: 70vh;
  overflow-y: auto;
}
.modal-warning {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 4px;
  padding: .55rem .85rem;
  margin-bottom: .9rem;
  font-size: .85rem;
  color: #78350f;
}
.modal-error-banner {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 4px;
  padding: .55rem .85rem;
  margin-bottom: .9rem;
  font-size: .85rem;
  color: #991b1b;
}
.modal-actions {
  display: flex;
  gap: .65rem;
  justify-content: flex-end;
  margin-top: 1.1rem;
}
</style>
{% endblock %}

{% block content %}
{{ block.super }}

<dialog id="maturity-modal">
  <div class="modal-header">
    <strong>{% trans "Assign Maturity Tags" %}</strong>
    <button type="button" class="modal-close-btn" id="modal-x-btn" aria-label="{% trans "Close" %}">&times;</button>
  </div>
  <div class="modal-body" id="modal-body"></div>
</dialog>

<script>
(function () {
  "use strict";

  var modal     = document.getElementById("maturity-modal");
  var modalBody = document.getElementById("modal-body");

  /* ── helpers ─────────────────────────────────────────────────────────── */
  function getCookie(name) {
    var value = "; " + document.cookie;
    var parts = value.split("; " + name + "=");
    if (parts.length === 2) return parts.pop().split(";").shift();
    return "";
  }

  function closeModal() {
    modal.close();
    modalBody.innerHTML = "";
  }

  function showErrorOnly(msg) {
    modalBody.innerHTML =
      '<div class="modal-error-banner">' + msg + "</div>" +
      '<div class="modal-actions">' +
        '<button type="button" class="button" id="err-close-btn">{% trans "Close" %}</button>' +
      "</div>";
    document.getElementById("err-close-btn").addEventListener("click", closeModal);
    modal.showModal();
  }

  function ajaxPost(data, callback) {
    var csrf = getCookie("csrftoken");
    fetch(window.location.pathname, {
      method: "POST",
      headers: {
        "X-Requested-With": "XMLHttpRequest",
        "X-CSRFToken": csrf,
      },
      body: data,
    })
      .then(function (r) {
        if (r.status === 403) throw new Error("{% trans "Your session may have expired. Please refresh the page and try again." %}");
        if (!r.ok) throw new Error("{% trans "Server error" %} (" + r.status + "). {% trans "Please try again." %}");
        return r.json();
      })
      .then(callback)
      .catch(function (err) { showErrorOnly(err.message); });
  }

  /* ── close triggers ──────────────────────────────────────────────────── */
  document.getElementById("modal-x-btn").addEventListener("click", closeModal);
  modal.addEventListener("click", function (e) { if (e.target === modal) closeModal(); });
  modal.addEventListener("cancel", function (e) { e.preventDefault(); closeModal(); });

  /* ── intercept action form submit ────────────────────────────────────── */
  document.getElementById("changelist-form").addEventListener("submit", function (e) {
    var actionEl = this.querySelector("[name=action]");
    if (!actionEl || actionEl.value !== "action_assign_maturity_tags") return;
    e.preventDefault();

    // Guard: if nothing is selected Django returns HTML (not JSON), which
    // causes a JSON.parse error.  Catch it here before making the request.
    var checked = this.querySelectorAll("[name=_selected_action]:checked");
    var selectAcross = this.querySelector("[name=select_across]");
    var allSelected = selectAcross && selectAcross.value === "1";
    if (checked.length === 0 && !allSelected) {
      showErrorOnly("{% trans "Please select at least one submission before applying this action." %}");
      return;
    }

    ajaxPost(new FormData(this), function (data) {
      if (data.status === "error") { showErrorOnly(data.message); return; }

      var html = "";
      if (data.warning_count > 0) {
        html += '<div class="modal-warning"><strong>{% trans "Note:" %}</strong> ' +
          data.warning_count + " {% trans "selected submission(s) are not approved and will be skipped." %}</div>";
      }
      html += '<form id="modal-form">' + data.form_html +
        '<div class="modal-actions">' +
          '<button type="button" class="button" id="modal-cancel-btn">{% trans "Cancel" %}</button>' +
          '<button type="submit" name="_assign_tags" value="1" class="button default" id="modal-submit-btn">{% trans "Assign Tags" %}</button>' +
        "</div></form>";
      modalBody.innerHTML = html;

      document.getElementById("modal-cancel-btn").addEventListener("click", closeModal);
      document.getElementById("modal-form").addEventListener("submit", handleModalSubmit);
      modal.showModal();
    });
  });

  /* ── modal form submit ───────────────────────────────────────────────── */
  function handleModalSubmit(e) {
    e.preventDefault();

    var submitBtn = document.getElementById("modal-submit-btn");
    submitBtn.disabled = true;
    submitBtn.textContent = "{% trans "Assigning\u2026" %}";

    // FormData from a form element never includes the submit button, so we
    // must append _assign_tags explicitly to trigger the second-POST branch.
    var fd = new FormData(this);
    fd.append("_assign_tags", "1");

    ajaxPost(fd, function (data) {
      if (data.status === "error") {
        var banner = document.getElementById("modal-error-banner");
        if (!banner) {
          banner = document.createElement("div");
          banner.id = "modal-error-banner";
          banner.className = "modal-error-banner";
          document.getElementById("modal-form").prepend(banner);
        }
        banner.textContent = data.message;
        submitBtn.disabled = false;
        submitBtn.textContent = "{% trans "Assign Tags" %}";
        return;
      }

      closeModal();
      var content = document.getElementById("content-main");
      var msgList = document.createElement("ul");
      msgList.className = "messagelist";
      msgList.innerHTML = '<li class="success">' + data.message + "</li>";
      content.insertBefore(msgList, content.firstChild);
      setTimeout(function () { window.location.reload(); }, 1500);
    });
  }
})();
</script>
{% endblock %}
