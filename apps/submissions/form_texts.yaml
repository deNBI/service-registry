# =============================================================================
# Registration Form — Help Text, Tooltips & Section Descriptions
# =============================================================================
#
# This file controls three types of text shown on the registration form:
#
#   sections:
#     <a|b|c|d|e|f|g>:
#       description: "Introductory paragraph shown at the top of the section card.
#                     Leave empty ("") to show no description for that section."
#
#   <field_name>:
#     help: "Short text shown below the field."
#     tooltip: "Longer guidance shown when hovering/clicking the info icon."
#
# Rules:
#   - Leave "description", "help", or "tooltip" empty ("") to hide them.
#   - Keep "help" to one short sentence; put detail in "tooltip".
#   - Use plain text only — no raw HTML.
#   - Section descriptions support:
#       [link text](https://example.com)  → named hyperlink
#       https://example.com               → auto-linked bare URL
#       Blank line (two newlines)         → paragraph break
#       Single newline (use | block)      → line break
#

# ── Section descriptions ──────────────────────────────────────────────────────

sections:
  a:
    description: ""
  b:
    description: "This section collects the core information describing the service, including its scope, structure, category, and scientific context."
  c:
    description: "The section asks for the responsibility of the Service and for the person who can be contacted by the user and the administration office (responsiveness)."
  d:
    description: "This section collects all public links associated with the service, including the main website, terms of use, license information, and registry entries. These links ensure transparency, accessibility, and proper referencing of the service."
  e:
    description: |
      This section collects information on KPI monitoring for your service. KPIs help demonstrate usage, impact, and sustainability and contribute to reporting within de.NBI and ELIXIR-DE.

      Please note that KPI requirements depend on the selected service category. An overview of category-dependent KPIs that must or may be collected is provided in the [de.NBI KPI Compass.](https://www.denbi.de/images/Service/20210624_KPI_Cheat_Sheet_doi.pdf)
  f:
    description: >-
      This section collects keywords and consent information that support the discoverability, impact assessment, and communication of your service. The provided information helps us identify service usage beyond formal citations and improve visibility in search
      engines and outreach activities.
  g:
    description: ""

# ── Section A — General Information ──────────────────────────────────────────

date_of_entry:
  help: "Date of submission or last update."
  tooltip: "Enter the date on which this information is submitted or last updated. This helps track changes and revisions over time."

submitter_first_name:
  help: "First name of the person filling in this form."
  tooltip: "Provide the first name of the person submitting or updating this service entry."

submitter_last_name:
  help: "Last name of the person filling in this form."
  tooltip: "Provide the last name of the person submitting or updating this service entry."

submitter_affiliation:
  help: "Start typing to search for your institution, or enter a custom name."
  tooltip: "Type the name of your institute or affiliation. A list of suggestions will appear, drawn from active PIs and past submissions — just select yours. If your institute isn't in the list, you can type a custom name and it will be saved."

register_as_elixir:
  help: "Register this service also as an ELIXIR-DE Service?"
  tooltip: "Only possible if the applicant is affiliated with an ELIXIR-DE member institute. See: https://elixir-europe.org/services/list?field_elixir_node_target_id_entityreference_filter=2364"

# ── Section B — Service Master Data ──────────────────────────────────────────

service_name:
  help: "Official name of the service."
  tooltip: "Official name as it should appear on the de.NBI website and in related communications."

service_description:
  help: "Describe your service."
  tooltip: "Provide a clear and comprehensive description (recommended: 75–500 words). This description is used not only for human readers but also for machine processing (e.g. search engines and AI-based systems). Well-structured, precise descriptions significantly improve discoverability, reuse, and integration into automated workflows. If this is a toolbox, briefly describe each included tool. The de.NBI team can support drafting."

year_established:
  help: "Year the service became available."
  tooltip: "Since which year is the service available to the community."

service_categories:
  help: "Select all applicable service categories."
  tooltip: "Select all relevant categories. For collections of multiple tools or services, also select Toolbox. Contact us if unsure."

is_toolbox:
  help: "Is this a toolbox or part of one?"
  tooltip: "If yes, include a Tools section in the description. Tools can be described collectively and KPIs may be aggregated."

toolbox_name:
  help: "Name of the de.NBI toolbox."
  tooltip: "Enter the toolbox name. Contact the de.NBI Service Coordination Team before registering a new toolbox."

user_knowledge_required:
  help: "Required user knowledge."
  tooltip: "Describe the required level of prior knowledge (e.g. none, basic bioinformatics, command-line, advanced programming)."

edam_topics:
  help: "Scientific domain."
  tooltip: "Select up to 6 EDAM Topics to improve discoverability in bio.tools, ELIXIR, and EOSC."

edam_operations:
  help: "Computational operations."
  tooltip: "Select up to 6 EDAM Operations describing what your service does."

publications_pmids:
  help: "Publications related to this service."
  tooltip: "List all related publications. PMIDs preferred and required for ELIXIR impact assessment. Separate multiple entries by commas. If your service is a consulting offering or does not yet have a valid publication for other reasons, please enter 1234567."

logo:
  help: "Optional service logo. Accepted formats: PNG, JPEG, SVG. Maximum 10 MB."
  tooltip: "Upload a logo to represent your service."

# ── Section C — Responsibilities ─────────────────────────────────────────────

responsible_pis:
  help: "Responsible PIs."
  tooltip: "Select the principal investigator(s) responsible for this service."

associated_partner_note:
  help: "If PI not listed."
  tooltip: "Provide the PI's name and affiliation if not available in the list."

host_institute:
  help: "Start typing to search for the host institute, or enter a custom name."
  tooltip: "The institute where the service is operationally hosted and maintained. As with the affiliation field above, you can search for known institutes or enter a custom name if not listed."

service_center:
  help: "Search and select the de.NBI service centre this service is affiliated with."
  tooltip: "Select a single de.NBI service centre from the dropdown. Start typing to filter the list of available centres. This helps organize services within the de.NBI network."

public_contact_email:
  help: "Public contact email."
  tooltip: "This email will be displayed on the de.NBI website. Functional addresses (e.g. service@...) are recommended."

internal_contact_name:
  help: "Internal contact person."
  tooltip: "Contact person for communication with the de.NBI administration office. Not publicly visible."

internal_contact_email:
  help: "Internal contact email."
  tooltip: "Used exclusively for communication with the de.NBI administration office. Must be actively maintained. Not publicly visible."

internal_contact_email_confirm:
  help: "Confirm internal email."
  tooltip: "Re-enter the email address to avoid typographical errors."

# ── Section D — Websites & Links ─────────────────────────────────────────────

website_url:
  help: "Service website."
  tooltip: "Public landing page of the service. Include full URL (https://)."

terms_of_use_url:
  help: "Terms of use."
  tooltip: "Link to terms, conditions, or usage policies of the service."

license:
  help: "Service license."
  tooltip: "Select the license under which the service or software is provided."
  choices:
    agpl3: "GNU AGPLv3"
    gpl3: "GNU GPLv3"
    gpl2: "GNU GPLv2"
    lgpl3: "GNU LGPLv3"
    lgpl21: "GNU LGPLv2.1"
    mpl2: "Mozilla Public License 2.0"
    apache2: "Apache License 2.0"
    mit: "MIT License"
    bsd2: "BSD 2-Clause License"
    bsd3: "BSD 3-Clause License"
    isc: "ISC License"
    boost: "Boost Software License 1.0"
    epl2: "Eclipse Public License 2.0"
    eupl12: "European Union Public License 1.2"
    cc0: "Creative Commons Zero (CC0 1.0)"
    cc_by4: "Creative Commons Attribution 4.0"
    cc_by_sa4: "Creative Commons Attribution-ShareAlike 4.0"
    artistic2: "Artistic License 2.0"
    unlicense: "The Unlicense"
    other: "None of the above"
    na: "Not applicable"

github_url:
  help: "GitHub repository (optional)."
  tooltip: "Provide link if available. Leave empty if not applicable."

biotools_url:
  help: "bio.tools entry (optional)."
  tooltip: "Provide link if available. Leave empty if not applicable."

fairsharing_url:
  help: "FAIRsharing entry (optional)."
  tooltip: "Provide link if available. Leave empty if not applicable."

other_registry_url:
  help: "Other registry (optional)."
  tooltip: "Provide link if listed in another registry (e.g. EOSC). Leave empty if not applicable."

# ── Section E — KPIs ─────────────────────────────────────────────────────────

kpi_monitoring:
  help: "Is KPI monitoring in place?"
  tooltip: "Select Yes if KPIs are already monitored, or Planned if monitoring will be implemented."

kpi_start_year:
  help: "Start year of KPI monitoring."
  tooltip: "Year when KPI monitoring started or is planned to start."

# ── Section F — Discoverability & Outreach ───────────────────────────────────

keywords_uncited:
  help: "Keywords for uncited usage."
  tooltip: "Provide names, abbreviations, or URLs used instead of formal citations (e.g. in Materials and Methods). These also support automated detection of service usage in publications."

keywords_seo:
  help: "Keywords supporting search engine and AI-based discoverability."
  tooltip: "Provide keywords that improve discoverability in search engines and support machine-based indexing (e.g. by AI systems). Keywords complement, but do not replace, a clear and well-structured service description."

survey_participation:
  help: "Participation in user surveys."
  tooltip: "Requires placing the de.NBI survey link on your service website. Results will be shared."

comments:
  help: "Additional comments."
  tooltip: "Optional. Provide any relevant context for onboarding."

# ── Section G — Consent ──────────────────────────────────────────────────────

data_protection_consent:
  label: >-
    I agree and give consent to the data protection information described above,
    and I consent to de.NBI potentially featuring this service in outreach activities
    such as social media posts, newsletters, and other communications.
  help: ""
  tooltip: "Required to process and store the submitted information according to de.NBI regulations."


