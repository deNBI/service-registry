# =============================================================================
# de.NBI Service Registration Platform — Site Configuration
# =============================================================================
#
# This file is the ONE PLACE to edit all non-secret site settings:
#   - Branding (name, logo, colours)
#   - Contact addresses and links
#   - External resource URLs (KPI docs, privacy policy, …)
#   - Email sender identity
#   - Feature flags
#
# What does NOT belong here:
#   - Passwords, secret keys, API tokens  → .env
#   - Database / Redis connection details → .env
#   - Infrastructure / deployment tuning → .env
#
# After editing this file, restart the web / worker containers:
#   docker compose restart web worker beat
#
# Format: TOML  https://toml.io/en/
# =============================================================================


# -----------------------------------------------------------------------------
# [site] — Core identity shown throughout the UI and emails
# -----------------------------------------------------------------------------
[site]

# Human-readable name used in page titles, email subjects, and the navbar.
name = "de.NBI Service Registration Platform"

# Short tagline shown in the browser tab and meta description.
tagline = "de.NBI & ELIXIR-DE Service Registration Platform"

# The canonical public URL of this deployment (no trailing slash).
# Used in emails, API contact info, and the bio.tools client User-Agent.
url = "https://service-registry.bi.denbi.de"

# Logo URL.  Three options:
#   1. A local static path:     "/static/img/denbi-logo-color.svg"  ← recommended
#      Served by nginx with Cache-Control: public, immutable (1-year browser cache).
#      Download the file once:
#        curl -o static/img/denbi-logo-color.svg \
#          https://www.denbi.de/templates/nbimaster/img/denbi-logo-color.svg
#   2. An absolute URL:         "https://www.denbi.de/templates/nbimaster/img/denbi-logo-color.svg"
#      Browser caching depends on the external server's response headers.
#   3. Empty string:            ""   → renders the text fallback (de.NBI coloured text)
logo_url = "https://www.denbi.de/templates/nbimaster/img/denbi-logo-color.svg"

# Favicon URL.  Three options:
#   1. A local static path:     "/static/img/favicon.ico"  (recommended)
#   2. An absolute URL:         "https://example.org/favicon.ico"
#   3. Empty string:            ""  → auto-detects static/img/favicon.ico if present
favicon_url = ""

# -----------------------------------------------------------------------------
# [contact] — All contact addresses in one place
# -----------------------------------------------------------------------------
[contact]

# Primary coordination address — shown in form sidebars, footers, and emails.
email = "servicecoordination@denbi.de"

# Address displayed in the footer description line.
office = "Forschungszentrum Jülich GmbH - IBG-5, c/o Bielefeld University"

# Name of the organisation shown in the footer and emails.
organisation = "German Network for Bioinformatics Infrastructure"


# -----------------------------------------------------------------------------
# [email] — Sender identity (credentials stay in .env)
# -----------------------------------------------------------------------------
[email]

# The From address on all outbound emails.
# Overridden by the EMAIL_FROM env var if that is set.
from_address = "no-reply@denbi.de"

# Subject prefix prepended to all notification emails.
subject_prefix = "[de.NBI Service Registration Platform]"


# -----------------------------------------------------------------------------
# [links] — External URLs referenced in the UI
# -----------------------------------------------------------------------------
[links]

# Main organisation website.
website = "https://www.denbi.de"

# Privacy policy page linked in the registration form and footer.
privacy_policy = "https://www.denbi.de/privacy-policy"

# Legal imprint linked in the footer.
imprint = "https://www.denbi.de/imprint"

# de.NBI data protection information page (linked in consent section of form).
data_protection = "https://www.denbi.de/privacy-policy"

# KPI cheat-sheet PDF linked in the KPI section of the form.
kpi_cheatsheet = "https://www.denbi.de/images/Service/20210624_KPI_Cheat_Sheet_doi.pdf"

# User guide documentation page.
user_guide = "https://denbi.github.io/service-registry/user-guide/"


# -----------------------------------------------------------------------------
# [api] — OpenAPI / Swagger metadata
# -----------------------------------------------------------------------------
[api]

# Title shown in the Swagger UI and ReDoc pages.
title = "de.NBI Service Registration Platform API"

# API version string.
version = "1.0.0"

# License name shown in the OpenAPI schema.
license_name = "MIT"


# -----------------------------------------------------------------------------
# [features] — Toggle optional site features
# -----------------------------------------------------------------------------
[features]

# Show the bio.tools prefill banner on the registration form.
biotools_prefill = true

# Enable EDAM ontology annotation fields on the registration form.
edam_annotations = true

# Enable the public Registry Catalogue page.
catalogue = true

#-----------------------------------------------------------------------------
# [edam] — EDAM Ontology sync settings
# -----------------------------------------------------------------------------
[edam]

# URL of the EDAM OWL file fetched by `manage.py sync_edam`.
# Overridden by the EDAM_OWL_URL env var if that is set (e.g. for air-gapped
# servers pointing to a local file path).
#
# To pin a specific release, change to e.g.:
#   owl_url = "https://edamontology.org/EDAM_1.25.owl"
# To use a local file (air-gapped):
#   owl_url = "/app/EDAM.owl"
owl_url = "https://edamontology.org/EDAM_stable.owl"


# -----------------------------------------------------------------------------
# [licenses] — SPDX License List sync settings
# -----------------------------------------------------------------------------
[licenses]

# URL of the SPDX license list JSON fetched by `manage.py sync_spdx_licenses`.
# Overridden by the SPDX_LICENSES_URL env var if that is set (e.g. for
# air-gapped servers pointing to a local file path).
#
# To pin a specific release tag, change to e.g.:
#   url = "https://raw.githubusercontent.com/spdx/license-list-data/v3.26/json/licenses.json"
# To use a local file (air-gapped):
#   url = "/app/spdx-licenses.json"
url = "https://raw.githubusercontent.com/spdx/license-list-data/main/json/licenses.json"


# -----------------------------------------------------------------------------
# [admin] — Django admin interface settings
# -----------------------------------------------------------------------------
[admin]

# URL path prefix for the Django admin interface.
# Obfuscating this reduces automated scanning noise; it is not a security
# boundary on its own — always require strong passwords and 2FA in production.
# Overridden by the ADMIN_URL_PREFIX env var if that is set.
#
# Example: setting url_prefix = "backstage" means the admin lives at /backstage/
url_prefix = "admin-denbi"


# -----------------------------------------------------------------------------
# [uploads] — File upload limits and policies
# -----------------------------------------------------------------------------
[uploads]

# Maximum allowed size in bytes for service logo uploads.
# Default: 10 MB. Set lower to tighten limits, higher to allow larger files.
# After changing, restart the web container: docker compose restart web
logo_max_bytes = 10_485_760


# -----------------------------------------------------------------------------
# [submission] — Submission lifecycle settings
# -----------------------------------------------------------------------------
[submission]

# Fields listed here will NOT trigger a status reset to "submitted" when a
# submitter edits an already-approved service.  Use this for supplementary /
# reference fields (e.g. logo, external URLs, ontology annotations) that do
# not change the core service description and therefore should not force a
# full re-review cycle.
#
# Rules:
#   - Empty list ([])  → original behaviour: any edit of an approved service
#                        always resets status to "submitted".
#   - Non-empty list   → status is reset ONLY if at least one NON-exempt field
#                        changes.  If only exempt fields change, status is kept.
#   - Notifications are always sent regardless of this setting.
#   - When status IS reset, the update email includes a lifecycle notice.
#
# Sanity-checked at startup: unknown field names are logged as a warning and
# ignored.  System-controlled fields (status, date_of_entry, primary_maturity_tag,
# secondary_maturity_tags, register_as_elixir) cannot be made exempt.
#
# Available field names (model-level):
#   Scalar fields:
#     submitter_first_name    submitter_last_name     submitter_affiliation
#     service_name            service_description     year_established
#     is_toolbox              toolbox_name            user_knowledge_required
#     publications_pmids      logo                    associated_partner_note
#     host_institute          public_contact_email    internal_contact_name
#     internal_contact_email  website_url             terms_of_use_url
#     license_note            github_url              biotools_url
#     fairsharing_url         other_registry_url      kpi_monitoring
#     kpi_start_year          keywords_uncited        keywords_seo
#     survey_participation    comments
#   Many-to-many fields:
#     service_categories      responsible_pis         edam_topics
#     edam_operations         licenses
no_reset_fields = [
  "logo",
  "github_url",
  "biotools_url",
  "fairsharing_url",
  "other_registry_url",
  "edam_topics",
  "edam_operations",
  "keywords_uncited",
  "keywords_seo",
  "publications_pmids",
  "public_contact_email",
  "internal_contact_name",
  "internal_contact_email",
  "website_url",
  "terms_of_use_url",
  "kpi_monitoring",
  "kpi_start_year",
  "comments",
]

# Number of days before an abandoned browser-side form draft is automatically
# discarded.  The draft is removed from localStorage on the next form load once
# the TTL has elapsed.  Drafts are always cleared immediately when the form is
# successfully submitted.
# Default: 7 days.
draft_ttl_days = 7


# -----------------------------------------------------------------------------
# [catalogue] — Public Registry Catalogue settings
# -----------------------------------------------------------------------------
[catalogue]

# Fields shown on each service card. Remove a key to hide that field.
# Available: "categories", "service_center", "edam_topics", "maturity_tag", "updated_at"
card_fields = ["categories", "service_center", "edam_topics", "updated_at", "maturity_tag"]

# Number of service cards per page (server-side pagination).
per_page = 12

# Meta description used in the catalogue page <meta name="description"> and OpenGraph tags.
meta_description = "Browse all approved de.NBI & ELIXIR-DE bioinformatics services."
